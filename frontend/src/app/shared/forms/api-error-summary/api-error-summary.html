@if (error(); as apiError) {
  <div class="api-error-summary" role="alert">
    <mat-icon aria-hidden="true" fontIcon="error" />
    <div>
      <p class="api-error-summary__message">{{ apiError.message }}</p>
      @if (messages().length > 0) {
        <ul class="api-error-summary__details">
          @for (message of messages(); track message) {
            <li>{{ message }}</li>
          }
        </ul>
      }
    </div>
  </div>
}
