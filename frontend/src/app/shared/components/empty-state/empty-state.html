<section class="empty-state" aria-live="polite">
  <mat-icon class="empty-state__icon" aria-hidden="true" [fontIcon]="icon()" />
  <h2 class="empty-state__title">{{ title() }}</h2>
  @if (message(); as stateMessage) {
    <p class="empty-state__message">{{ stateMessage }}</p>
  }
  <div class="empty-state__actions">
    <ng-content />
  </div>
</section>
