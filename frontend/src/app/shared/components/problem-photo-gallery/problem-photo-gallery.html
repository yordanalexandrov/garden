@if (photos().length > 0) {
  <div class="photo-grid">
    @for (photo of photos(); track photo.id; let i = $index) {
      <button
        type="button"
        class="thumb-btn"
        (click)="open(i)"
        [attr.aria-label]="photo.originalFilename ?? 'Problem photo ' + (i + 1)"
      >
        <img
          class="thumb-img"
          [src]="photo.url"
          [alt]="photo.originalFilename ?? 'Problem photo ' + (i + 1)"
          loading="lazy"
        />
      </button>
    }
  </div>

  @if (currentPhoto(); as photo) {
    <div class="lb-backdrop" (click)="close()" (keydown.escape)="close()" role="dialog" aria-modal="true" aria-label="Photo lightbox">
      <div class="lb-panel" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()" tabindex="-1">
        <img class="lb-img" [src]="photo.url" [alt]="photo.originalFilename ?? 'Photo'" />
        <button class="lb-close" type="button" (click)="close()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
        @if (photos().length > 1) {
          <button class="lb-prev" type="button" (click)="prev()" aria-label="Previous photo">
            <mat-icon>chevron_left</mat-icon>
          </button>
          <button class="lb-next" type="button" (click)="next()" aria-label="Next photo">
            <mat-icon>chevron_right</mat-icon>
          </button>
        }
      </div>
    </div>
  }
} @else {
  <p class="no-photos">No photos attached.</p>
}
