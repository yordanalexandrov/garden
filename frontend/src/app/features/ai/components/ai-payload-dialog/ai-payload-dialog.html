<h2 mat-dialog-title>
  <mat-icon fontIcon="data_object" aria-hidden="true" />
  Suggestion payload (JSON)
</h2>

<mat-dialog-content class="ai-payload-dialog__content">
  @if (editable) {
    <mat-form-field class="ai-payload-dialog__field" appearance="outline">
      <mat-label>Payload (JSON)</mat-label>
      <textarea
        matInput
        [formControl]="payloadControl"
        rows="16"
        autocomplete="off"
        aria-label="Suggestion payload as JSON"
      ></textarea>
      <mat-hint>Edit the JSON payload before accepting, or close to keep it unchanged.</mat-hint>
    </mat-form-field>

    @if (parseError(); as error) {
      <p class="ai-payload-dialog__error" role="alert">
        <mat-icon fontIcon="error" aria-hidden="true" /> {{ error }}
      </p>
    }
  } @else {
    <pre class="ai-payload-dialog__readonly" aria-label="Suggestion payload as JSON">{{ data.payloadJson }}</pre>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if (editable) {
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button type="button" color="primary" (click)="save()">Save</button>
  } @else {
    <button mat-flat-button type="button" (click)="cancel()">Close</button>
  }
</mat-dialog-actions>
