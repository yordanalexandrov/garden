name: CI

# Пуска се при отваряне на PR към master и при всеки нов комит в PR-а
# (types: synchronize), докато PR-ът не се мържне.
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

# Отменя предходен незавършен пробег при нов push в същия PR.
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # 1. Backend lint
  backend-lint:
    name: Backend · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # 2. Backend typecheck
  backend-typecheck:
    name: Backend · typecheck
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  # 3. Frontend lint
  frontend-lint:
    name: Frontend · lint
    runs-on: ubuntu-latest
    needs: backend-typecheck
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # 4. Frontend typecheck
  frontend-typecheck:
    name: Frontend · typecheck
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  # 5. Frontend PWA / architecture boundaries
  frontend-boundaries:
    name: Frontend · boundaries
    runs-on: ubuntu-latest
    needs: frontend-typecheck
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check:frontend-boundaries

  # 6. Backend unit тестове (без база данни — DB-зависимите suite-и се self-skip-ват)
  backend-unit-tests:
    name: Backend · unit tests
    runs-on: ubuntu-latest
    needs: frontend-boundaries
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Без TEST_DATABASE_URL -> 33-те DB suite-а минават през describe.skip.
      - run: npm test

  # 7. Backend DB integration тестове (реален Postgres, серийно изпълнение)
  backend-db-tests:
    name: Backend · DB integration tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: garden_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      # Името garden_test съдържа "test" -> минава database-safety guard-а за reset.
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/garden_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # --no-file-parallelism: DB suite-ите reset-ват обща схема и трябва да вървят серийно.
      - run: npm test -- --no-file-parallelism

  # 8. Frontend unit тестове
  frontend-tests:
    name: Frontend · unit tests
    runs-on: ubuntu-latest
    needs: backend-db-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false

  # 9. Backend build
  backend-build:
    name: Backend · build
    runs-on: ubuntu-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  # 10. Frontend build
  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
