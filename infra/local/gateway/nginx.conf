server {
  listen 8000;
  server_name _;

  client_max_body_size 50m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header X-Real-IP $remote_addr;

  location = /health {
    access_log off;
    return 200 "ok\n";
  }

  location = /auth/v1 {
    return 308 /auth/v1/;
  }

  location /auth/v1/ {
    proxy_pass http://supabase-auth:9999/;
  }

  location = /rest/v1 {
    return 308 /rest/v1/;
  }

  location /rest/v1/ {
    proxy_pass http://supabase-rest:3000/;
  }

  location = /storage/v1 {
    return 308 /storage/v1/;
  }

  location /storage/v1/ {
    proxy_pass http://supabase-storage:5000/;
  }

  location = /pg {
    return 308 /pg/;
  }

  location /pg/ {
    proxy_pass http://supabase-meta:8080/;
  }

  location / {
    return 404;
  }
}
