map $http_origin $local_auth_cors_origin {
  default "";
  "http://localhost:4200" $http_origin;
  "http://127.0.0.1:4200" $http_origin;
}

server {
  listen 8000;
  server_name _;

  client_max_body_size 50m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header X-Real-IP $remote_addr;

  location = /health {
    access_log off;
    return 200 "ok\n";
  }

  location = /auth/v1 {
    return 308 /auth/v1/;
  }

  location /auth/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Max-Age;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Vary;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $local_auth_cors_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "apikey, authorization, content-type, x-client-info, x-supabase-api-version" always;
      add_header Access-Control-Max-Age 86400 always;
      add_header Vary "Origin, Access-Control-Request-Method, Access-Control-Request-Headers" always;
      add_header Content-Length 0;
      return 204;
    }

    add_header Access-Control-Allow-Origin $local_auth_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Total-Count, Link, X-Supabase-Api-Version" always;
    add_header Vary "Origin" always;
    proxy_pass http://supabase-auth:9999/;
  }

  location = /rest/v1 {
    return 308 /rest/v1/;
  }

  location /rest/v1/ {
    proxy_pass http://supabase-rest:3000/;
  }

  location = /storage/v1 {
    return 308 /storage/v1/;
  }

  location /storage/v1/ {
    proxy_pass http://supabase-storage:5000/;
  }

  location = /pg {
    return 308 /pg/;
  }

  location /pg/ {
    proxy_pass http://supabase-meta:8080/;
  }

  location / {
    return 404;
  }
}
